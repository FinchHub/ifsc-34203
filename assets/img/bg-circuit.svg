<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      .line { stroke: #a78bfa; stroke-width: 0.5; fill: none; opacity: 0.12; }
      .node { fill: #a78bfa; opacity: 0.18; }
      .pulse { fill: #a78bfa; opacity: 0; }

      @keyframes blink1 { 0%,100%{opacity:0} 50%{opacity:0.5} }
      @keyframes blink2 { 0%,100%{opacity:0} 50%{opacity:0.4} }
      @keyframes blink3 { 0%,100%{opacity:0} 50%{opacity:0.35} }
      @keyframes travel1 {
        0%   { cx: 40;  cy: 80;  opacity: 0; }
        10%  { opacity: 0.6; }
        40%  { cx: 200; cy: 80;  opacity: 0.6; }
        50%  { cx: 200; cy: 160; opacity: 0.6; }
        80%  { cx: 360; cy: 160; opacity: 0.6; }
        90%  { opacity: 0; }
        100% { cx: 360; cy: 160; opacity: 0; }
      }
      @keyframes travel2 {
        0%   { cx: 360; cy: 400; opacity: 0; }
        10%  { opacity: 0.5; }
        35%  { cx: 120; cy: 400; opacity: 0.5; }
        50%  { cx: 120; cy: 560; opacity: 0.5; }
        75%  { cx: 280; cy: 560; opacity: 0.5; }
        90%  { opacity: 0; }
        100% { cx: 280; cy: 560; opacity: 0; }
      }
      @keyframes travel3 {
        0%   { cx: 40;  cy: 640; opacity: 0; }
        15%  { opacity: 0.4; }
        45%  { cx: 280; cy: 640; opacity: 0.4; }
        60%  { cx: 280; cy: 720; opacity: 0.4; }
        85%  { cx: 360; cy: 720; opacity: 0.4; }
        95%  { opacity: 0; }
        100% { cx: 360; cy: 720; opacity: 0; }
      }

      .p1 { animation: travel1 6s ease-in-out infinite; }
      .p2 { animation: travel2 8s ease-in-out 2s infinite; }
      .p3 { animation: travel3 7s ease-in-out 4s infinite; }

      .n1 { animation: blink1 4s ease-in-out infinite; }
      .n2 { animation: blink2 5s ease-in-out 1s infinite; }
      .n3 { animation: blink3 6s ease-in-out 2.5s infinite; }
      .n4 { animation: blink1 3.5s ease-in-out 0.5s infinite; }
      .n5 { animation: blink2 4.5s ease-in-out 3s infinite; }
    </style>
  </defs>

  <!-- horizontal lines -->
  <line class="line" x1="0" y1="80"  x2="400" y2="80"/>
  <line class="line" x1="0" y1="160" x2="400" y2="160"/>
  <line class="line" x1="0" y1="240" x2="400" y2="240"/>
  <line class="line" x1="0" y1="320" x2="400" y2="320"/>
  <line class="line" x1="0" y1="400" x2="400" y2="400"/>
  <line class="line" x1="0" y1="480" x2="400" y2="480"/>
  <line class="line" x1="0" y1="560" x2="400" y2="560"/>
  <line class="line" x1="0" y1="640" x2="400" y2="640"/>
  <line class="line" x1="0" y1="720" x2="400" y2="720"/>

  <!-- vertical lines -->
  <line class="line" x1="40"  y1="0" x2="40"  y2="800"/>
  <line class="line" x1="120" y1="0" x2="120" y2="800"/>
  <line class="line" x1="200" y1="0" x2="200" y2="800"/>
  <line class="line" x1="280" y1="0" x2="280" y2="800"/>
  <line class="line" x1="360" y1="0" x2="360" y2="800"/>

  <!-- intersection nodes -->
  <circle class="node n1" cx="40"  cy="80"  r="2.5"/>
  <circle class="node n2" cx="200" cy="80"  r="2.5"/>
  <circle class="node n3" cx="360" cy="80"  r="2.5"/>
  <circle class="node n4" cx="120" cy="160" r="2.5"/>
  <circle class="node n5" cx="280" cy="160" r="2.5"/>
  <circle class="node n1" cx="40"  cy="240" r="2.5"/>
  <circle class="node n3" cx="200" cy="240" r="2.5"/>
  <circle class="node n2" cx="360" cy="240" r="2.5"/>
  <circle class="node n5" cx="120" cy="320" r="2.5"/>
  <circle class="node n4" cx="280" cy="320" r="2.5"/>
  <circle class="node n1" cx="40"  cy="400" r="2.5"/>
  <circle class="node n3" cx="120" cy="400" r="2.5"/>
  <circle class="node n2" cx="280" cy="400" r="2.5"/>
  <circle class="node n5" cx="360" cy="400" r="2.5"/>
  <circle class="node n4" cx="200" cy="480" r="2.5"/>
  <circle class="node n1" cx="40"  cy="560" r="2.5"/>
  <circle class="node n3" cx="120" cy="560" r="2.5"/>
  <circle class="node n2" cx="280" cy="560" r="2.5"/>
  <circle class="node n5" cx="360" cy="560" r="2.5"/>
  <circle class="node n4" cx="40"  cy="640" r="2.5"/>
  <circle class="node n1" cx="200" cy="640" r="2.5"/>
  <circle class="node n3" cx="280" cy="640" r="2.5"/>
  <circle class="node n2" cx="120" cy="720" r="2.5"/>
  <circle class="node n5" cx="360" cy="720" r="2.5"/>

  <!-- traveling pulses -->
  <circle class="pulse p1" r="3"/>
  <circle class="pulse p2" r="3"/>
  <circle class="pulse p3" r="2.5"/>
</svg>
